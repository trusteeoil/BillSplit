<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <title>BillSplit</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --green: #5bc5a7;
        --green-dark: #3ea98a;
        --orange: #e67e5a;
        --bg: #f4f5f7;
        --surface: #ffffff;
        --border: #e2e4e9;
        --ink: #1a1c21;
        --muted: #7a8294;
        --font: "Nunito", sans-serif;
      }
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: var(--font);
        background: var(--bg);
        color: var(--ink);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
      }
      .card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 20px;
        padding: 40px 36px;
        width: 100%;
        max-width: 400px;
        box-shadow: 0 4px 24px rgba(0, 0, 0, 0.06);
      }
      .logo {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 32px;
        justify-content: center;
      }
      .logo-icon {
        width: 44px;
        height: 44px;
        background: var(--green);
        border-radius: 12px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.4rem;
      }
      .logo-text {
        font-size: 1.4rem;
        font-weight: 800;
        letter-spacing: -0.3px;
      }
      .logo-sub {
        font-size: 0.75rem;
        color: var(--muted);
        font-weight: 500;
      }
      h2 {
        font-size: 1.3rem;
        font-weight: 800;
        margin-bottom: 6px;
        text-align: center;
      }
      .subtitle {
        font-size: 0.82rem;
        color: var(--muted);
        font-weight: 500;
        text-align: center;
        margin-bottom: 28px;
      }
      .form-label {
        display: block;
        font-size: 0.65rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: var(--muted);
        margin-bottom: 5px;
      }
      .form-input {
        width: 100%;
        background: var(--bg);
        border: 2px solid transparent;
        border-radius: 10px;
        padding: 11px 14px;
        font-family: var(--font);
        font-size: 0.92rem;
        font-weight: 600;
        color: var(--ink);
        outline: none;
        transition: border-color 0.15s;
        margin-bottom: 14px;
      }
      .form-input:focus {
        border-color: var(--orange);
        background: #fff;
      }
      .btn {
        width: 100%;
        font-family: var(--font);
        font-size: 0.92rem;
        font-weight: 700;
        padding: 13px;
        border-radius: 10px;
        border: none;
        cursor: pointer;
        background: var(--orange);
        color: #fff;
        transition:
          opacity 0.15s,
          transform 0.1s;
        margin-top: 4px;
      }
      .btn:hover {
        opacity: 0.88;
      }
      .btn:active {
        transform: scale(0.98);
      }
      .btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
      .error {
        background: #fef2f2;
        border: 1px solid #fecaca;
        border-radius: 8px;
        padding: 10px 14px;
        font-size: 0.8rem;
        font-weight: 600;
        color: #dc2626;
        margin-bottom: 14px;
        display: none;
      }
      .error.show {
        display: block;
      }
      .loading {
        display: none;
      }
      .btn.loading-state .label {
        display: none;
      }
      .btn.loading-state .loading {
        display: inline;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="logo">
        <div class="logo-icon">🏠</div>
        <div>
          <div class="logo-text">BillSplit</div>
        </div>
      </div>
      <h2>Welcome back</h2>
      <p class="subtitle">Sign in to continue</p>
      <div class="error" id="error-msg"></div>
      <label class="form-label">Email</label>
      <input
        type="email"
        class="form-input"
        id="email"
        placeholder="you@example.com"
        autocomplete="email"
      />
      <label class="form-label">Password</label>
      <input
        type="password"
        class="form-input"
        id="password"
        placeholder="••••••••"
        autocomplete="current-password"
      />
      <button class="btn" id="login-btn" onclick="login()">
        <span class="label">Sign in</span>
        <span class="loading">Signing in...</span>
      </button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
      // ── CONFIG — replace these with your actual values ──
      const SUPABASE_URL = "https://gugwjzypsvlngjkdwwnm.supabase.co";
      const SUPABASE_KEY = "sb_publishable_J4zTIQr4gVEf-SLD6K9HNA_VodwWdNX";
      // ────────────────────────────────────────────────────

      const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

      // If already logged in, go straight to app
      sb.auth.getSession().then(({ data: { session } }) => {
        if (session) window.location.href = "app.html";
      });

      async function login() {
        const email = document.getElementById("email").value.trim();
        const password = document.getElementById("password").value;
        const btn = document.getElementById("login-btn");
        const err = document.getElementById("error-msg");
        err.classList.remove("show");
        if (!email || !password) {
          showError("Please enter your email and password.");
          return;
        }
        btn.classList.add("loading-state");
        btn.disabled = true;
        const { error } = await sb.auth.signInWithPassword({ email, password });
        btn.classList.remove("loading-state");
        btn.disabled = false;
        if (error) {
          showError(error.message);
          return;
        }
        window.location.href = "app.html";
      }

      function showError(msg) {
        const el = document.getElementById("error-msg");
        el.textContent = msg;
        el.classList.add("show");
      }

      // Allow enter key to submit
      document.addEventListener("keydown", (e) => {
        if (e.key === "Enter") login();
      });
    </script>
  </body>
</html>
